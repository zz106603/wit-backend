spring:
  application:
    name: wit-backend
  profiles:
    default: local

wit:
  location:
    cache:
      ttl: ${LOCATION_CACHE_TTL:24h}
    current:
      normalized-query: ${CURRENT_LOCATION_NORMALIZED_QUERY:current}
      display-location: ${CURRENT_LOCATION_DISPLAY_LOCATION:서울특별시 강남구}
      lat: ${CURRENT_LOCATION_LAT:37.5172}
      lng: ${CURRENT_LOCATION_LNG:127.0473}
  weather:
    cache:
      ttl: ${WEATHER_CACHE_TTL:1h}
    api:
      base-url: ${WEATHER_API_BASE_URL:https://api.example.com}
      current-path: ${WEATHER_API_CURRENT_PATH:/current}
      forecast-path: ${WEATHER_API_FORECAST_PATH:/forecast}
  recommendation:
    cache:
      ttl: ${RECOMMENDATION_CACHE_TTL:30m}
  google:
    oauth:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/integrations/google/callback}
      scope: ${GOOGLE_SCOPE:openid https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/calendar.readonly}
      authorization-base-url: ${GOOGLE_AUTHORIZATION_BASE_URL:https://accounts.google.com/o/oauth2/v2/auth}
      token-url: ${GOOGLE_TOKEN_URL:https://oauth2.googleapis.com/token}
      user-info-url: ${GOOGLE_USER_INFO_URL:https://www.googleapis.com/oauth2/v3/userinfo}
      state: ${GOOGLE_OAUTH_STATE:wit-google-state}
      access-token-expiry: ${GOOGLE_ACCESS_TOKEN_EXPIRY:1h}
    calendar:
      base-url: ${GOOGLE_CALENDAR_BASE_URL:https://www.googleapis.com}
      events-path: ${GOOGLE_CALENDAR_EVENTS_PATH:/calendar/v3/calendars/primary/events}
      time-zone: ${GOOGLE_CALENDAR_TIME_ZONE:Asia/Seoul}
