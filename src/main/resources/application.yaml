spring:
  application:
    name: wit-backend
  profiles:
    default: local

wit:
  location:
    cache:
      ttl: ${LOCATION_CACHE_TTL:24h}
    current:
      normalized-query: ${CURRENT_LOCATION_NORMALIZED_QUERY:current}
      display-location: ${CURRENT_LOCATION_DISPLAY_LOCATION:서울특별시 강남구}
      lat: ${CURRENT_LOCATION_LAT:37.5172}
      lng: ${CURRENT_LOCATION_LNG:127.0473}
  weather:
    cache:
      ttl: ${WEATHER_CACHE_TTL:1h}
    api:
      base-url: ${WEATHER_API_BASE_URL:https://api.example.com}
      current-path: ${WEATHER_API_CURRENT_PATH:/current}
      forecast-path: ${WEATHER_API_FORECAST_PATH:/forecast}
