spring:
  application:
    name: wit-backend
  profiles:
    default: local

wit:
  location:
    cache:
      ttl: ${LOCATION_CACHE_TTL:24h}
    places:
      google:
        api-key: ${GOOGLE_PLACES_API_KEY:}
        base-url: ${GOOGLE_PLACES_BASE_URL:https://places.googleapis.com}
        text-search-path: ${GOOGLE_PLACES_TEXT_SEARCH_PATH:/v1/places:searchText}
        language-code: ${GOOGLE_PLACES_LANGUAGE_CODE:ko}
        region-code: ${GOOGLE_PLACES_REGION_CODE:KR}
        page-size: ${GOOGLE_PLACES_PAGE_SIZE:1}
        field-mask: ${GOOGLE_PLACES_FIELD_MASK:places.id,places.displayName,places.formattedAddress,places.location}
    current:
      normalized-query: ${CURRENT_LOCATION_NORMALIZED_QUERY:current}
      display-location: ${CURRENT_LOCATION_DISPLAY_LOCATION:서울특별시 강남구}
      lat: ${CURRENT_LOCATION_LAT:37.5172}
      lng: ${CURRENT_LOCATION_LNG:127.0473}
  weather:
    cache:
      ttl: ${WEATHER_CACHE_TTL:1h}
    api:
      provider: ${WEATHER_API_PROVIDER:open-meteo}
      base-url: ${OPEN_METEO_BASE_URL:https://api.open-meteo.com}
      current-path: ${OPEN_METEO_FORECAST_PATH:/v1/forecast}
      forecast-path: ${OPEN_METEO_FORECAST_PATH:/v1/forecast}
      time-zone: ${OPEN_METEO_TIME_ZONE:Asia/Seoul}
      current-fields: ${OPEN_METEO_CURRENT_FIELDS:temperature_2m,apparent_temperature,precipitation,rain,weather_code}
      hourly-fields: ${OPEN_METEO_HOURLY_FIELDS:temperature_2m,apparent_temperature,precipitation_probability,precipitation,rain,weather_code}
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      model: ${GEMINI_MODEL:}
      generate-content-path: ${GEMINI_GENERATE_CONTENT_PATH:/v1beta/models/{model}:generateContent}
      connect-timeout: ${GEMINI_CONNECT_TIMEOUT:3s}
      read-timeout: ${GEMINI_READ_TIMEOUT:10s}
  recommendation:
    cache:
      ttl: ${RECOMMENDATION_CACHE_TTL:30m}
  google:
    oauth:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/integrations/google/callback}
      scope: ${GOOGLE_SCOPE:openid https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/calendar.readonly}
      authorization-base-url: ${GOOGLE_AUTHORIZATION_BASE_URL:https://accounts.google.com/o/oauth2/v2/auth}
      token-url: ${GOOGLE_TOKEN_URL:https://oauth2.googleapis.com/token}
      user-info-url: ${GOOGLE_USER_INFO_URL:https://www.googleapis.com/oauth2/v3/userinfo}
      state: ${GOOGLE_OAUTH_STATE:wit-google-state}
      access-token-expiry: ${GOOGLE_ACCESS_TOKEN_EXPIRY:1h}
    calendar:
      base-url: ${GOOGLE_CALENDAR_BASE_URL:https://www.googleapis.com}
      events-path: ${GOOGLE_CALENDAR_EVENTS_PATH:/calendar/v3/calendars/primary/events}
      time-zone: ${GOOGLE_CALENDAR_TIME_ZONE:Asia/Seoul}
